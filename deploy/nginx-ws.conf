# nginx reverse-proxy config for zyra-ws (WebSocket service)
#
# Sticky routing via consistent hash on workspace_id:
#   All WebSocket connections that share the same workspace_id are routed to
#   the same zyra-ws instance. This is required because Room state (clients,
#   AOI grid, pendingMoves) lives in-memory per instance — cross-instance
#   fanout is not implemented. Adding/removing a node only reshuffles ~1/N of
#   the workspaces ("consistent" keyword), not all of them.
#
# Usage:
#   Copy or symlink this file into /etc/nginx/conf.d/ and reload:
#     nginx -t && nginx -s reload
#
#   Adjust the `server` lines in the upstream block to match your Docker
#   container names (or IPs) and confirm all instances listen on port 3004.

upstream zyra_ws_pool {
    # hash key = workspace_id query param  (e.g. ?workspace_id=abc123)
    # "consistent" = ketama ring — only ~1/N workspaces move on node add/remove
    hash $arg_workspace_id consistent;

    # List every zyra-ws instance. Container names resolve via Docker's internal
    # DNS when running in the same Compose network.
    server zyra-ws-1:3004 max_fails=3 fail_timeout=10s;
    server zyra-ws-2:3004 max_fails=3 fail_timeout=10s;
    # server zyra-ws-3:3004 max_fails=3 fail_timeout=10s;  # uncomment to add a third node
}

server {
    listen 80;
    server_name ws.zyra.center;   # adjust to your domain

    # /ws  — WebSocket upgrade + sticky routing
    location /ws {
        proxy_pass         http://zyra_ws_pool;
        proxy_http_version 1.1;

        # Required headers for WebSocket handshake
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived (hours).
        # Raise these well above the client heartbeat interval (30s).
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout   10s;

        # Disable response buffering — frames must flow through immediately
        proxy_buffering off;
    }

    # /healthz  — liveness probe; no WebSocket, no sticky required
    location /healthz {
        proxy_pass         http://zyra_ws_pool;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        # Short timeout — this should respond in < 1s
        proxy_read_timeout    5s;
        proxy_connect_timeout 3s;
    }
}
